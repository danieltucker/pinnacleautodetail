<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Generator — Pinnacle Auto Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,900&display=swap" rel="stylesheet">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a1a;
  color: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  gap: 32px;
  padding: 40px 24px;
}
h1 {
  font-size: 1rem;
  font-weight: 500;
  color: #888;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin: 0;
}
.canvas-wrap {
  background: #0a0a0a;
  border: 1px solid rgba(224,184,78,0.3);
  border-radius: 4px;
  padding: 0;
  line-height: 0;
}
canvas { display: block; }
.actions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.btn-download {
  background: #e0b84e;
  color: #000;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  padding: 14px 36px;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.15s;
}
.btn-download:hover { background: #f0ce70; }
.note {
  font-size: 0.78rem;
  color: #666;
  text-align: center;
  max-width: 400px;
  line-height: 1.6;
}
.variants {
  display: flex;
  gap: 12px;
}
.btn-variant {
  background: transparent;
  color: #888;
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid #444;
  padding: 8px 18px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
}
.btn-variant:hover, .btn-variant.active { background: #333; color: #e0b84e; border-color: #e0b84e; }
</style>
</head>
<body>

<h1>Pinnacle Auto Detail — Logo Generator</h1>

<div class="canvas-wrap">
  <canvas id="logo" width="600" height="160"></canvas>
</div>

<div class="actions">
  <div class="variants">
    <button class="btn-variant active" onclick="draw('dark')">Dark (for schema)</button>
    <button class="btn-variant" onclick="draw('white')">White (for print)</button>
    <button class="btn-variant" onclick="draw('transparent')">Transparent</button>
  </div>
  <button class="btn-download" onclick="download()">Download PNG</button>
  <p class="note">
    Download the <strong>Dark</strong> version and save it as <code>logo.png</code> in your site folder.
    Then update the schema to reference it.
  </p>
</div>

<script>
const canvas = document.getElementById('logo');
const ctx = canvas.getContext('2d');
let currentVariant = 'dark';

function draw(variant) {
  currentVariant = variant;

  document.querySelectorAll('.btn-variant').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  if (variant === 'dark') {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else if (variant === 'white') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  // transparent: no fill

  const textColor = variant === 'white' ? '#0a0a0a' : '#f5f0e8';
  const gold = '#e0b84e';

  ctx.font = "italic 900 76px 'Barlow Condensed', sans-serif";
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '2px';

  const cx = canvas.width / 2;
  const cy = canvas.height / 2 - 6;

  // Measure each piece
  ctx.font = "italic 900 76px 'Barlow Condensed', sans-serif";
  const wPinnacle = ctx.measureText('PINNACLE').width;
  const wDot      = ctx.measureText('.').width;
  const wDetail   = ctx.measureText('DETAIL').width;
  const total     = wPinnacle + wDot + wDetail;
  const startX    = cx - total / 2;

  // Draw PINNACLE
  ctx.fillStyle = textColor;
  ctx.fillText('PINNACLE', startX, cy);

  // Draw .
  ctx.fillStyle = gold;
  ctx.fillText('.', startX + wPinnacle, cy);

  // Draw DETAIL
  ctx.fillStyle = textColor;
  ctx.fillText('DETAIL', startX + wPinnacle + wDot, cy);

  // Gold accent line
  const lineW = Math.min(total * 0.4, 120);
  ctx.fillStyle = gold;
  ctx.fillRect(cx - lineW / 2, cy + 50, lineW, 3);
}

function download() {
  const link = document.createElement('a');
  link.download = `pinnacle-autodetail-logo-${currentVariant}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Wait for font to load before drawing
document.fonts.ready.then(() => draw('dark'));
</script>

</body>
</html>
